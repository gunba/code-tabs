<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Claude Tabs</title>
    <style>
      @font-face {
        font-family: 'Inter';
        src: url('/src/assets/fonts/Inter-Variable.woff2') format('woff2');
        font-weight: 100 900;
        font-display: swap;
      }
      @font-face {
        font-family: 'Pragmasevka';
        src: local('Pragmasevka'), local('Pragmasevka Nerd Font'), local('Pragmasevka NF');
        font-display: swap;
      }
      /* Emoji fallback restricted to actual emoji codepoints so Noto Color Emoji
         cannot claim plain digits/letters and render them with its gradient style. */
      @font-face {
        font-family: 'ClaudeEmoji';
        src: local('Segoe UI Emoji'), local('Apple Color Emoji'), local('Noto Color Emoji'), local('Twemoji Mozilla');
        unicode-range:
          U+200D, U+20E3, U+FE0F,
          U+2300-23FF, U+2600-26FF, U+2700-27BF, U+2B00-2BFF,
          U+1F000-1F9FF, U+1FA00-1FAFF, U+1FB00-1FBFF,
          U+E0020-E007F;
      }
      :root {
        --font-ui: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        --font-mono: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', monospace;
        --bg-primary: #1f1e1c;
        --bg-surface: #262523;
        --bg-surface-hover: #302f2c;
        --bg-hover: #302f2c;
        --bg-selection: #302f2c;
        --border: #3d3a36;
        --border-subtle: #33302c;
        --text-primary: #f9f7f3;
        --text-secondary: #bfbdb7;
        --text-muted: #9a9893;
        --text-on-accent: #ffffff;
        --accent: #d4744a;
        --accent-hover: #e08b67;
        --accent-bg: #3d2a20;
        --accent-secondary: #6ea8e0;
        --accent-tertiary: #bc8cff;
        --success: #5cb85c;
        --warning: #b8860b;
        --error: #d84b4b;
        --info: #6ea8e0;
        --permission: #e08b67;
        --term-bg: #1f1e1c;
        --term-fg: #f9f7f3;
        --term-cursor: #d4744a;
        --term-selection: #3d2a20;
        --scroll-thumb: #3d3a36;
        --scroll-track: #1f1e1c;
      }
      html, body, #root {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: var(--bg-primary);
        color: var(--text-secondary);
        font-family: var(--font-ui);
      }
      /* Pre-render skeleton that matches the app layout */
      .app-skeleton {
        display: flex;
        flex-direction: column;
        height: 100vh;
      }
      .app-skeleton-main {
        flex: 1;
        background: var(--bg-primary);
      }
      .app-skeleton-bar {
        height: 24px;
        background: var(--bg-surface);
        border-top: 1px solid var(--border);
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="app-skeleton">
        <div class="app-skeleton-main"></div>
        <div class="app-skeleton-bar"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
