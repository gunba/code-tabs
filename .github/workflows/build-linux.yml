name: Build Linux

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.7

      - name: Verify sccache backend
        run: |
          if ! sccache --start-server 2>/dev/null && ! sccache rustc -vV 2>/dev/null; then
            echo "::warning::sccache backend unavailable, falling back to direct compilation"
            echo "RUSTC_WRAPPER=" >> "$GITHUB_ENV"
            echo "SCCACHE_GHA_ENABLED=false" >> "$GITHUB_ENV"
          fi

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Resolve Claude Code build version
        run: |
          CC_VERSION=$(npm view @anthropic-ai/claude-code version 2>/dev/null || echo "unknown")
          echo "CLAUDE_CODE_BUILD_VERSION=$CC_VERSION" >> "$GITHUB_ENV"
          echo "Resolved Claude Code version: $CC_VERSION"

      - name: Build Tauri
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build --bundles deb,rpm,appimage

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*.AppImage.tar.gz
            src-tauri/target/release/bundle/appimage/*.AppImage.tar.gz.sig
            src-tauri/target/release/claude-tabs

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release view "$tag" 2>/dev/null || gh release create "$tag" --title "$tag" --generate-notes
          for f in src-tauri/target/release/bundle/deb/*.deb \
                   src-tauri/target/release/bundle/rpm/*.rpm \
                   src-tauri/target/release/bundle/appimage/*.AppImage \
                   src-tauri/target/release/bundle/appimage/*.AppImage.tar.gz \
                   src-tauri/target/release/bundle/appimage/*.AppImage.tar.gz.sig; do
            [ -f "$f" ] && gh release upload "$tag" "$f" --clobber
          done
          gh release upload "$tag" src-tauri/target/release/claude-tabs#claude-tabs-linux-portable --clobber

      - name: Generate and upload latest.json
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          version="${tag#v}"

          sig_file=$(find src-tauri/target/release/bundle/appimage -name "*.AppImage.tar.gz.sig" | head -1)
          if [ -z "$sig_file" ]; then
            echo "::warning::No .AppImage.tar.gz.sig found, skipping latest.json"
            exit 0
          fi
          sig=$(cat "$sig_file")

          tar_file=$(find src-tauri/target/release/bundle/appimage -name "*.AppImage.tar.gz" ! -name "*.sig" | head -1)
          if [ -z "$tar_file" ]; then
            echo "::error::No .AppImage.tar.gz found"
            exit 1
          fi
          tar_name=$(basename "$tar_file")

          # Try to download existing latest.json (Windows may have uploaded first)
          existing="{}"
          if gh release download "$tag" --pattern "latest.json" --dir . 2>/dev/null; then
            existing=$(cat latest.json)
          fi

          # Merge linux-x86_64 into existing platforms
          echo "$existing" | jq \
            --arg v "$version" \
            --arg d "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg sig "$sig" \
            --arg url "https://github.com/gunba/claude-tabs/releases/download/$tag/$tar_name" \
            '{
              version: $v,
              notes: ("Release v" + $v),
              pub_date: $d,
              platforms: ((.platforms // {}) + {"linux-x86_64": {signature: $sig, url: $url}})
            }' > latest.json

          gh release upload "$tag" latest.json --clobber
