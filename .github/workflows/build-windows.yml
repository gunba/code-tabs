name: Build Windows

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.7

      - name: Verify sccache backend
        shell: bash
        run: |
          if ! sccache --start-server 2>/dev/null && ! sccache rustc -vV 2>/dev/null; then
            echo "::warning::sccache backend unavailable, falling back to direct compilation"
            echo "RUSTC_WRAPPER=" >> "$GITHUB_ENV"
            echo "SCCACHE_GHA_ENABLED=false" >> "$GITHUB_ENV"
          fi

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri
        run: npx tauri build --bundles nsis

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/claude-tabs.exe

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release view "$tag" 2>/dev/null || gh release create "$tag" --title "$tag" --generate-notes
          for f in src-tauri/target/release/bundle/nsis/*.exe; do
            [ -f "$f" ] && gh release upload "$tag" "$f" --clobber
          done
          gh release upload "$tag" "src-tauri/target/release/claude-tabs.exe#claude-tabs-windows-portable.exe" --clobber
