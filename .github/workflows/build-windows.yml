name: Build Windows

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: windows-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: windows-cargo-

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri
        run: npx tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/claude-tabs.exe

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release view "$tag" 2>/dev/null || gh release create "$tag" --title "$tag" --generate-notes
          for f in src-tauri/target/release/bundle/nsis/*.exe; do
            [ -f "$f" ] && gh release upload "$tag" "$f" --clobber
          done
          gh release upload "$tag" "src-tauri/target/release/claude-tabs.exe#claude-tabs-windows-portable.exe" --clobber
