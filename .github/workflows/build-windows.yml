name: Build Windows

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.7

      - name: Verify sccache backend
        shell: bash
        run: |
          if ! sccache --start-server 2>/dev/null && ! sccache rustc -vV 2>/dev/null; then
            echo "::warning::sccache backend unavailable, falling back to direct compilation"
            echo "RUSTC_WRAPPER=" >> "$GITHUB_ENV"
            echo "SCCACHE_GHA_ENABLED=false" >> "$GITHUB_ENV"
          fi

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Resolve Claude Code build version
        shell: bash
        run: |
          CC_VERSION=$(npm view @anthropic-ai/claude-code version 2>/dev/null || echo "unknown")
          echo "CLAUDE_CODE_BUILD_VERSION=$CC_VERSION" >> "$GITHUB_ENV"
          echo "Resolved Claude Code version: $CC_VERSION"

      - name: Build Tauri
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build --bundles nsis

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe.sig
            src-tauri/target/release/code-tabs.exe

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release view "$tag" 2>/dev/null || gh release create "$tag" --title "$tag" --generate-notes
          for f in src-tauri/target/release/bundle/nsis/*.exe \
                   src-tauri/target/release/bundle/nsis/*.exe.sig; do
            [ -f "$f" ] && gh release upload "$tag" "$f" --clobber
          done
          gh release upload "$tag" "src-tauri/target/release/code-tabs.exe#code-tabs-windows-portable.exe" --clobber

      - name: Generate and upload latest.json
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          version="${tag#v}"

          sig_file=$(find src-tauri/target/release/bundle/nsis -name "*.exe.sig" | head -1)
          if [ -z "$sig_file" ]; then
            echo "::warning::No .exe.sig found, skipping latest.json"
            exit 0
          fi
          sig=$(cat "$sig_file")

          installer_file=$(find src-tauri/target/release/bundle/nsis -name "*.exe" ! -name "*.sig" | head -1)
          if [ -z "$installer_file" ]; then
            echo "::error::No setup .exe found"
            exit 1
          fi
          installer_name=$(basename "$installer_file")

          # Try to download existing latest.json (Linux may have uploaded first)
          existing="{}"
          if gh release download "$tag" --pattern "latest.json" --dir . 2>/dev/null; then
            existing=$(cat latest.json)
          fi

          # Merge windows-x86_64 into existing platforms
          echo "$existing" | jq \
            --arg v "$version" \
            --arg d "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg sig "$sig" \
            --arg url "https://github.com/gunba/code-tabs/releases/download/$tag/$installer_name" \
            '{
              version: $v,
              notes: ("Release v" + $v),
              pub_date: $d,
              platforms: ((.platforms // {}) + {"windows-x86_64": {signature: $sig, url: $url}})
            }' > latest.json

          gh release upload "$tag" latest.json --clobber
